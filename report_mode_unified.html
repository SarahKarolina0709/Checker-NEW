<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Unified Report</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin:20px; background:#f6f8fa; }
    header { display:flex; flex-wrap:wrap; gap:16px; align-items:baseline; margin:0 0 18px; }
    header h1 { margin:0; font-size:1.25rem; }
    .mode-badge { font-size:.65rem; background:#1F4E79; color:#fff; padding:4px 8px; border-radius:4px; letter-spacing:.5px; text-transform:uppercase; }
    .meta-line { font-size:.7rem; color:#475569; display:flex; gap:14px; flex-wrap:wrap; }
    .export-hint { margin-left:auto; font-size:.65rem; color:#334155; }
    .group-block { margin:0 0 28px; }
    .group-block > h2 { font-size:1rem; margin:0 0 12px; border-bottom:2px solid #e2e8f0; padding-bottom:4px; }
    .print-footer { display:none; }
    @media print { .mode-badge, .export-hint, .team-only { display:none !important; } body { background:#fff; } }
    @media print { 
      body[data-mode='export'] .print-footer { 
        display:block; position:fixed; bottom:0; left:0; right:0; 
        font-size:10px; color:#475569; padding:4px 12px; background:#fff; 
        border-top:1px solid #e2e8f0; 
        display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
      }
    }
  </style>
  <script type="module">
    import { loadReportData, normalizeData, renderReport, createStateManager, ensureBaseStyles } from './report_core_base.js';
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode') === 'export' ? 'export' : 'team';
    const src = params.get('src') || 'report_data_sample.json';
    const group = params.get('group');                 // grouping parameter
    const autoPrint = params.get('print') === '1';     // auto print flag
    const app = document.getElementById('app');
    const badge = document.getElementById('modeBadge');
    badge.textContent = mode === 'team' ? 'TEAM' : 'EXPORT';
    document.body.dataset.mode = mode;
    ensureBaseStyles();
    (async function(){
      try {
        const raw = await loadReportData({ source: src });
        const data = normalizeData(raw);
        document.getElementById('metaCount').textContent = data.issues.length + ' Issues';
        document.getElementById('metaGen').textContent = new Date(data.meta.generatedAt || Date.now()).toLocaleString('de-DE');
        if(mode === 'export') {
          if (group) {
            renderGrouped(app, data, group);
          } else {
            renderReport({ container: app, data, mode: 'export' });
          }
          injectPrintFooter();
          if (autoPrint) setTimeout(() => window.print(), 400);
        } else {
          const teamMod = await import('./report_mode_team.js');
          const state = createStateManager(data, { persist:true });
            renderReport({ container: app, data, mode: 'team' });
            teamMod.default ? teamMod.default({ container: app, state }) : injectTeamLayer(teamMod, app, state);
        }
      } catch (e) {
        app.innerHTML = '<p style="color:#DC2626;">Fehler beim Laden: '+ (e.message||e) +'</p>';
      }
    })();
    function injectTeamLayer(teamMod, container, state){
      if(teamMod.mountControls && teamMod.updateBadges){
        teamMod.mountControls(container, state);
        state.subscribe(()=>teamMod.updateBadges(container, state));
      } else {
        console.warn('Team Funktionen nicht gefunden – bitte report_mode_team.js prüfen');
      }
    }
    // Grouping Renderer
    function renderGrouped(container, data, kind){
      const isPriority = kind === 'priority'; // fallback auf Kategorie, falls unbekannt
      const label = isPriority ? 'Priorität' : 'Kategorie';
      const keyFn = isPriority ? (i)=>i.priority : (i)=>i.category;
      const groups = new Map();
      data.issues.forEach(i=>{
        const k = keyFn(i) || '—';
        (groups.get(k) || groups.set(k, []).get(k)).push(i);
      });
      container.innerHTML = '';
      groups.forEach((issues, key)=>{
        const sec = document.createElement('section');
        sec.className = 'group-block';
        sec.innerHTML = `<h2>${label}: ${esc(key)} (${issues.length})</h2><div class="group-issues"></div>`;
        container.appendChild(sec);
        renderReport({ container: sec.querySelector('.group-issues'), data: { meta: data.meta, issues }, mode: 'export' });
      });
    }
    function esc(str){return String(str).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c]));}
    function injectPrintFooter(){
      if(document.getElementById('printFooter')) return;
      const f = document.createElement('div');
      f.id = 'printFooter';
      f.className = 'print-footer';
      const ts = new Date();
      const tsStr = ts.toLocaleString('de-DE');
      f.innerHTML = `<span>Export erzeugt: ${esc(tsStr)}</span><span>Seite <span class="page-num"></span></span>`;
      document.body.appendChild(f);
      // CSS-only page counter (nur aktuelle Seite). Gesamtseiten mit Chrome/PagedMedia counter(pages) experimentell.
      const style = document.createElement('style');
      style.textContent = '@media print { .page-num:after { content: counter(page); } }';
      document.head.appendChild(style);
    }
  </script>
</head>
<body>
  <header>
    <h1>Qualitätsreport</h1>
    <span id="modeBadge" class="mode-badge"></span>
    <div class="meta-line">
      <span id="metaCount"></span>
      <span>Generiert: <span id="metaGen"></span></span>
    </div>
    <div class="export-hint">?mode=export oder ?mode=team verwenden</div>
  </header>
  <main id="app" aria-live="polite" aria-label="Report Container"></main>
  <!-- Print-Footer wird dynamisch eingefügt -->
</body>
</html>
