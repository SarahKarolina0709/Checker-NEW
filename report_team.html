<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Team Report</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Team Report Bootstrap: nutzt report_mode_team.js (Default-Export initTeam) -->
  <script type="module">
    import { loadReportData, normalizeData, renderReport, createStateManager, ensureBaseStyles } from './report_core_base.js';
    import initTeam from './report_mode_team.js';
    const src = 'report_data_sample.json'; // vereinheitlichte Beispielquelle
    (async () => {
      ensureBaseStyles();
      try {
        const raw = await loadReportData({ source: src });
        const data = normalizeData(raw);
        const state = createStateManager(data, { persist: true });
        const app = document.getElementById('app');
        renderReport({ container: app, data, mode: 'team' });
        initTeam({ container: app, state });
      } catch (e) {
        document.getElementById('app').innerHTML = '<p style="color:#DC2626;">Fehler beim Laden: ' + (e.message || e) + '</p>';
      }
    })();
  </script>
  <style>body { font-family: system-ui, Arial, sans-serif; margin:20px; background:#f5f7fa; }</style>
</head>
<body>
  <h1 style="margin-top:0;">Team Report (Interaktiv)</h1>
  <main id="app" aria-label="Interaktiver Report"></main>
</body>
</html>
