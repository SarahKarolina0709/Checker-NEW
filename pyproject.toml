[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Add markers for different test types
markers = [
    "unit: Unit tests for pure Python logic",
    "gui: GUI smoke tests",
    "integration: Integration tests",
    "performance: Performance benchmark tests",
    "slow: Tests that take more than 10 seconds",
    "theme: Theme system tests",
    "workflow: Workflow system tests",
    "data: Data validation tests",
    "load: Load and stress tests",
    "security: Security-related tests",
]

# Test discovery patterns
addopts = [
    "--strict-markers",
    "--strict-config",
    "--verbose",
    "--tb=short",
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-report=xml",
    "--timeout=30",
]

# Coverage configuration
[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "venv/*",
    ".venv/*",
    "*/site-packages/*",
    "setup.py",
    "conftest.py",
    "*/__pycache__/*",
    "*/migrations/*",
    "validate_viewstack_integration.py",
    "test_*.py",
    "*_test.py",
    "BACKUP_BEFORE_CLEANUP/*",
    "run_tests.py",
    ".github/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
skip_covered = false
precision = 2
ignore_errors = true

[tool.coverage.html]
directory = "htmlcov"

[tool.ruff]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = ["E", "F", "W", "C90", "I", "N", "UP", "YTT", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T10", "EM", "EXE", "ISC", "ICN", "G", "INP", "PIE", "T20", "PYI", "PT", "Q", "RSE", "RET", "SLF", "SIM", "TID", "TCH", "ARG", "PTH", "ERA", "PD", "PGH", "PL", "TRY", "NPY", "RUF"]

# Ignore specific rules that are too strict for GUI development
ignore = [
    "E501",    # Line too long (handled by black)
    "F401",    # Unused import (common in __init__.py files)
    "F841",    # Local variable assigned but never used (common in GUI callbacks)
    "C901",    # Function too complex (GUI functions can be complex)
    "PLR0913", # Too many arguments (GUI constructors often have many args)
    "PLR0912", # Too many branches (GUI event handlers can be complex)
    "S101",    # Use of assert (common in tests)
    "T201",    # Print statements (useful for debugging)
    "BLE001",  # Blind exception catching (sometimes necessary for GUI)
    "TRY003",  # Long exception messages (detailed messages are good)
]

# Allow autofix for all enabled rules (when `--fix`) is provided.
fixable = ["A", "B", "C", "D", "E", "F", "G", "I", "N", "Q", "S", "T", "W", "ANN", "ARG", "BLE", "COM", "DJ", "DTZ", "EM", "ERA", "EXE", "FBT", "ICN", "INP", "ISC", "NPY", "PD", "PGH", "PIE", "PL", "PT", "PTH", "PYI", "RET", "RSE", "RUF", "SIM", "SLF", "TCH", "TID", "TRY", "UP", "YTT"]
unfixable = []

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "htmlcov",
    ".pytest_cache",
]

# Same as Black.
line-length = 120
indent-width = 4

# Assume Python 3.8+
target-version = "py38"

[tool.ruff.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 15

[tool.ruff.per-file-ignores]
# Tests can use magic values, assertions, and have complex setups
"tests/*" = ["PLR2004", "S101", "PLR0913", "PLR0912", "C901"]
# __init__.py files can have unused imports
"__init__.py" = ["F401"]
# GUI files can have long functions and many arguments
"*_gui.py" = ["PLR0913", "PLR0912", "C901"]
"*_screen.py" = ["PLR0913", "PLR0912", "C901"]
"checker_app.py" = ["PLR0913", "PLR0912", "C901"]

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # GUI code often has complex types
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

# Ignore missing imports for GUI libraries
[[tool.mypy.overrides]]
module = [
    "customtkinter",
    "customtkinter.*",
    "tkinter",
    "tkinter.*",
    "PIL",
    "PIL.*",
    "pytesseract",
    "pdf2image",
    "tkinterdnd2",
    "tkinterdnd2.*",
]
ignore_missing_imports = true

[tool.black]
line-length = 120
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | htmlcov
)/
'''
