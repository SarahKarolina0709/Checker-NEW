# NOTE: Die aktive pytest-Konfiguration steht in pytest.ini (hat Vorrang vor
# pyproject.toml). Hier wird bewusst KEIN [tool.pytest.ini_options]-Block
# gepflegt, um doppelte/abweichende Konfiguration zu vermeiden. Die zuvor hier
# definierten Optionen (--cov, --timeout, --strict-config) setzten die nicht
# installierten Plugins pytest-cov/pytest-timeout voraus und hätten pytest beim
# Aktivieren zum Absturz gebracht.

# Coverage configuration
[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "venv/*",
    ".venv/*",
    "*/site-packages/*",
    "setup.py",
    "conftest.py",
    "*/__pycache__/*",
    "*/migrations/*",
    "test_*.py",
    "*_test.py",
    ".github/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
skip_covered = false
precision = 2
ignore_errors = true

[tool.coverage.html]
directory = "htmlcov"

[tool.ruff]
# Globale Ruff-Einstellungen (Format + Linter teilen sich diese)
line-length = 120
indent-width = 4
target-version = "py312"

# Ausgeschlossene Verzeichnisse
exclude = [
    ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg",
    ".mypy_cache", ".nox", ".pants.d", ".pytype", ".ruff_cache",
    ".svn", ".tox", ".venv", "__pypackages__", "_build", "buck-out",
    "build", "dist", "node_modules", "venv", "htmlcov", ".pytest_cache",
    "_legacy",
]

[tool.ruff.lint]
# Aktive Regeln: Standard-Linting + Imports + Builtins + Bugbear + Vereinfachung
# PD (pandas) + NPY (numpy) absichtlich ausgelassen — nicht in dieser App
# ARG (unused args) ausgelassen — NiceGUI-Callbacks haben oft ungenutzte Parameter
select = ["E", "F", "W", "C90", "I", "N", "UP", "YTT", "S", "BLE", "B", "A", "C4", "DTZ", "EM", "ISC", "PIE", "T20", "PT", "Q", "RET", "SIM", "TID", "PTH", "PGH", "PL", "TRY", "RUF"]

ignore = [
    "E501",    # Line too long — ruff format handhabt das
    "F401",    # Unused import (kommt in __init__.py vor)
    "F841",    # Lokale Variable unbenutzt (häufig in GUI-Callbacks)
    "C901",    # Funktion zu komplex (GUI-Funktionen dürfen komplex sein)
    "PLR0913", # Zu viele Argumente (NiceGUI-Builder-Aufrufe)
    "PLR0912", # Zu viele Branches (Event-Handler)
    "S101",    # assert-Verwendung (in Tests normal)
    "T201",    # Print-Statements (für Debug-Output)
    "BLE001",  # Breite Exception-Abfangung (manchmal in GUI nötig)
    "TRY003",  # Lange Exception-Meldungen (ausführliche Meldungen sind gut)
    "EM101",   # Exception-Meldung als String-Literal
    "EM102",   # Exception-Meldung als f-String
]

fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
"tests/*"             = ["PLR2004", "S101", "PLR0913", "PLR0912", "C901"]
"__init__.py"         = ["F401"]
"*_gui.py"            = ["PLR0913", "PLR0912", "C901"]
"nicegui_app/main.py" = ["PLR0913", "PLR0912", "C901", "PLR0915"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # GUI code often has complex types
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

# Ignore missing stubs for third-party libraries used by this project
[[tool.mypy.overrides]]
module = [
    "nicegui",
    "nicegui.*",
    "pdfplumber",
    "pdfplumber.*",
    "fitz",           # PyMuPDF
    "pytesseract",
    "pdf2image",
    "pdf2image.*",
    "PIL",
    "PIL.*",
    "language_tool_python",
    "language_tool_python.*",
    "openpyxl",
    "openpyxl.*",
    "fpdf",
    "fpdf.*",
    "thefuzz",
    "thefuzz.*",
]
ignore_missing_imports = true

[tool.ruff.format]
# ruff format ersetzt black vollständig
quote-style = "double"
indent-style = "space"
line-ending = "auto"
