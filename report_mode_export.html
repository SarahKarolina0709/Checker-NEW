<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Report Export</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; background:#fafafa; color:#111; }
    header { margin:0 0 24px; }
    .meta-summary { font-size:.75rem; color:#555; display:flex; gap:16px; flex-wrap:wrap; }
    .group-block { margin:0 0 30px; break-inside: avoid; page-break-inside: avoid; }
    .group-block > h2 { font-size:1rem; margin:0 0 14px; border-bottom:2px solid #e2e8f0; padding-bottom:4px; }
    .issue { page-break-inside: avoid; break-inside: avoid; }
    .report-aspects-summary { font-size:.7rem; font-weight:600; margin:0 0 12px; padding:6px 10px; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:6px; }
    @page { margin: 15mm 15mm 18mm; }
    @media screen { .print-footer { display:none; } }
    @media print {
      body { background:#fff; }
      a { text-decoration:none; color:inherit; }
      .print-footer { position: fixed; bottom: 0; left:0; right:0; font-size:.6rem; text-align:center; color:#555; }
      .issue { box-shadow:none !important; }
      h1 { font-size:1.2rem; }
      .pageNumber::after { content: counter(page); }
    }
  </style>
  <script type="module">
    import { loadReportData, normalizeData, renderReport, ensureBaseStyles, summarizeIssueDimensions } from './report_core_base.js';
    (async function(){
      ensureBaseStyles();
      const params = new URLSearchParams(location.search);
      const group = params.get('group'); // category | priority | severity
      const autoPrint = params.get('print') === '1';
      const src = params.get('src') || 'report_data_sample.json';
      const app = document.getElementById('app');
      app.setAttribute('aria-busy','true');
      let data;
      try {
        data = normalizeData(await loadReportData({ source: src }));
      } catch (err) {
        console.error('Report-Load failed', err);
        document.getElementById('summary').textContent = 'Fehler beim Laden';
        app.innerHTML = `<p role=alert style="color:#b91c1c">Report konnte nicht geladen werden (${escapeHTML(String(err))}).</p>`;
        app.removeAttribute('aria-busy');
        return;
      }
      const dim = summarizeIssueDimensions(data.issues);
      const summaryBits = `Zahlen/Einheiten: ${dim.numbersUnits} • Rechtschreibung: ${dim.spelling} • Vollständigkeit: ${dim.completeness} • Namen: ${dim.names}`;
      document.getElementById('summary').textContent = `${data.issues.length} Einträge • ${summaryBits}`;
      document.title = `Qualitätsreport – ${data.issues.length} Einträge`;

      if(group === 'category') {
         renderGrouped(app, data, i=>i.category, 'Kategorie');
      } else if(group === 'priority' || group === 'severity') {
         renderGrouped(app, data, i=> i[group] ?? i.severity, group === 'priority' ? 'Priorität' : 'Schweregrad');
      } else {
         renderReport({ container: app, data, mode: 'export' });
      }
      app.removeAttribute('aria-busy');
      if(autoPrint) setTimeout(()=>window.print(), 400);
    })();
    function renderGrouped(container, data, groupFn, label){
      const groups = new Map();
      for (const issue of data.issues) { const k = groupFn(issue) || '—'; (groups.get(k) || groups.set(k, []).get(k)).push(issue); }
      const entries = [...groups.entries()].sort((a,b)=> b[1].length - a[1].length || String(a[0]).localeCompare(String(b[0])));
      container.innerHTML = '';
      for (const [key, issues] of entries) {
        const block = document.createElement('section');
        block.className='group-block';
        block.innerHTML = `<h2>${escapeHTML(label)}: ${escapeHTML(key)} (${issues.length})</h2><div class="group-issues"></div>`;
        container.appendChild(block);
        const tempData = { meta: data.meta, issues };
        renderReport({ container: block.querySelector('.group-issues'), data: tempData, mode: 'export' });
      }
    }
    function escapeHTML(str){ return String(str).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c])); }
  </script>
</head>
<body>
  <header>
    <h1>Qualitätsreport (Export)</h1>
    <div class="meta-summary"><span id="summary"></span><span>Generiert: <span id="gen"></span></span></div>
    <script>document.getElementById('gen').textContent = new Date().toLocaleString('de-DE');</script>
  </header>
  <main id="app" aria-label="Report" role="region" aria-live="polite"></main>
  <div class="print-footer">Report generiert am <span id="footerGen"></span> • Seite <span class="pageNumber"></span></div>
  <script>document.getElementById('footerGen').textContent=new Date().toLocaleDateString('de-DE');</script>
</body>
</html>
