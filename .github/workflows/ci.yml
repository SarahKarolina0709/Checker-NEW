name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  
jobs:
  # Static Analysis
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
    
    - name: Lint with ruff
      run: |
        # Check for linting errors
        ruff check .
        # Check formatting
        ruff format --check .
    
    - name: Type check with mypy
      run: |
        mypy . --ignore-missing-imports
      continue-on-error: true  # Type checking can be strict for GUI code
    
    - name: Check code formatting with black
      run: |
        black --check --diff .

  # Theme System Tests
  test-theme:
    name: Theme System Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
    
    - name: Run theme tests
      run: |
        python -m pytest tests/unit/test_theme_system.py -v --tb=short --timeout=30
    
    - name: Upload theme test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: theme-test-results
        path: |
          htmlcov/
          coverage.xml

  # Workflow System Tests
  test-workflow:
    name: Workflow System Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
    
    - name: Run workflow tests
      run: |
        python -m pytest tests/unit/test_workflow_system.py -v --tb=short --timeout=60
    
    - name: Upload workflow test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: workflow-test-results
        path: |
          htmlcov/
          coverage.xml

  # Data Validation Tests
  test-data:
    name: Data Validation Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
    
    - name: Run data validation tests
      run: |
        python -m pytest tests/unit/test_data_validation.py -v --tb=short --timeout=30
    
    - name: Upload data validation test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: data-validation-test-results
        path: |
          htmlcov/
          coverage.xml

  # Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        # Install GUI dependencies for testing
        pip install customtkinter pillow
    
    - name: Run unit tests
      run: |
        # Run tests with virtual display for GUI components
        xvfb-run -a python -m pytest tests/unit/ -v --tb=short --timeout=30
    
    - name: Upload unit test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          .coverage

  # GUI Smoke Tests
  test-gui:
    name: GUI Smoke Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          x11-utils \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run GUI smoke tests
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 3
        python -m pytest tests/gui/ -v --tb=short --timeout=60 -m "not slow"
    
    - name: Upload GUI test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: gui-test-results
        path: |
          htmlcov/
          coverage.xml

  # Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run integration tests
      run: |
        xvfb-run -a python -m pytest tests/integration/ -v --tb=short --timeout=120
    
    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: |
          htmlcov/
          coverage.xml

  # Performance Tests
  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run performance tests
      run: |
        python -m pytest tests/performance/ -v --tb=short --timeout=300
    
    - name: Run ViewStack validation
      run: |
        python validate_viewstack_integration.py
    
    - name: Upload performance test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-results
        path: |
          htmlcov/
          coverage.xml

  # Load Tests (separate job for extended testing)
  test-load:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'  # Only run on schedule
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run load tests
      run: |
        python -m pytest tests/performance/test_performance.py::TestLoadTesting -v --tb=short --timeout=600
    
    - name: Upload load test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: load-test-results
        path: |
          htmlcov/
          coverage.xml

  # Windows Tests
  test-windows:
    name: Windows Tests
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run unit tests on Windows
      run: |
        python -m pytest tests/unit/ -v --tb=short --timeout=30
    
    - name: Run GUI tests on Windows
      run: |
        python -m pytest tests/gui/ -v --tb=short --timeout=60 -k "not test_theme_switching"
      continue-on-error: true  # GUI tests can be flaky on CI

  # macOS Tests
  test-macos:
    name: macOS Tests
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install customtkinter pillow
    
    - name: Run unit tests on macOS
      run: |
        python -m pytest tests/unit/ -v --tb=short --timeout=30
    
    - name: Run GUI tests on macOS
      run: |
        python -m pytest tests/gui/ -v --tb=short --timeout=60 -k "not test_theme_switching"
      continue-on-error: true  # GUI tests can be flaky on CI

  # Coverage Report
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-unit, test-gui, test-integration]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
    
    - name: Download coverage reports
      uses: actions/download-artifact@v3
      with:
        path: coverage-reports
    
    - name: Combine coverage reports
      run: |
        coverage combine coverage-reports/*/.coverage
        coverage report --show-missing
        coverage html
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security scan with bandit
      run: |
        bandit -r . -x tests/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json --output safety-report.json
      continue-on-error: true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
